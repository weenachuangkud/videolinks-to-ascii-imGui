image:
    - Visual Studio 2015
branches:
    only:
        - ci
        - master
        - latest
        - 3.3-stable
skip_tags: true
environment:
    matrix:
        - GENERATOR: MinGW Makefiles
          BUILD_SHARED_LIBS: ON
          CFLAGS: -Werror
        - GENERATOR: MinGW Makefiles
          BUILD_SHARED_LIBS: OFF
          CFLAGS: -Werror
        - GENERATOR: Visual Studio 12 2013
          BUILD_SHARED_LIBS: ON
          CFLAGS: /WX
        - GENERATOR: Visual Studio 12 2013
          BUILD_SHARED_LIBS: OFF
          CFLAGS: /WX
matrix:
    fast_finish: true

build_script:
    # MinGW builds
    - IF "%GENERATOR%"=="MinGW Makefiles" cmake -B build -G "%GENERATOR%" -DBUILD_SHARED_LIBS=%BUILD_SHARED_LIBS%
    - IF "%GENERATOR%"=="MinGW Makefiles" cmake --build build
    # Visual Studio builds
    - IF "%GENERATOR%"=="Visual Studio 12 2013" cmake -B build -G "%GENERATOR%" -DBUILD_SHARED_LIBS=%BUILD_SHARED_LIBS%
    - IF "%GENERATOR%"=="Visual Studio 12 2013" cmake --build build --target glfw

notifications:
    - provider: Email
      to:
        - ci@glfw.org
      on_build_failure: true
      on_build_success: false
